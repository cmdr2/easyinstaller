name: CI

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

env:
  APP_NAME: DemoEasyInstaller
  APP_BINARY_NAME: demo_easyinstaller
  PACKAGE_NAME: demoeasyinstaller
  FLATPAK_APP_ID: com.demoeasyinstaller.app

jobs:
  build-windows:
    name: Build Windows Packages
    runs-on: windows-latest
    timeout-minutes: 10
    env:
      TARGET_OS: windows
      TARGET_ARCH: x86_64
      RELEASE_DIR: demo_app/release/windows-x86_64
      OUTPUT_DIR: dist/windows
      APP_EXECUTABLE: demo_easyinstaller.exe
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install easyinstaller
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pytest

      - name: Install NSIS
        shell: bash
        run: |
          nsis_zip="$RUNNER_TEMP/nsis-3.11.zip"
          curl -L 'https://sourceforge.net/projects/nsis/files/NSIS%203/3.11/nsis-3.11.zip/download' -o "$nsis_zip"
          unzip -q "$nsis_zip" -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/nsis-3.11" >> "$GITHUB_PATH"

      - name: Set package version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.0.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"

      - name: Run integration tests
        shell: bash
        run: |
          python -m pytest tests_integration -q

      - name: Build demo app release folder
        shell: bash
        run: |
          cmake -S demo_app -B demo_app/build/windows -DCMAKE_BUILD_TYPE=Release
          cmake --build demo_app/build/windows --config Release
          rm -rf "$RELEASE_DIR"
          cmake --install demo_app/build/windows --config Release --prefix "$RELEASE_DIR"

      - name: Package Windows artifacts
        shell: bash
        run: |
          mkdir -p "$OUTPUT_DIR"
          archive_base="$OUTPUT_DIR/demo-app-windows-x64"
          nsis_base="$OUTPUT_DIR/demo-app-windows-x64-setup"

          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type zip --output "$archive_base"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type tar.gz --output "$archive_base"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type nsis --output "$nsis_base" --app-name "$APP_NAME" --app-version "$APP_VERSION" --app-exec "$APP_EXECUTABLE"

      - name: Test Windows installers
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $packageRoot = Split-Path -Leaf $env:RELEASE_DIR

          function Invoke-DemoBinary([string]$binaryPath) {
            if (-not (Test-Path $binaryPath)) {
              throw "Missing binary: $binaryPath"
            }

            $output = & $binaryPath --headless
            if ($LASTEXITCODE -ne 0) {
              throw "Binary failed with exit code ${LASTEXITCODE}: $binaryPath"
            }
            if ($output -notmatch 'Hello easyinstaller') {
              throw "Unexpected output from ${binaryPath}: $output"
            }
          }

          $zipExtract = Join-Path $env:RUNNER_TEMP 'windows-zip'
          $tarExtract = Join-Path $env:RUNNER_TEMP 'windows-targz'
          $nsisInstall = Join-Path $env:RUNNER_TEMP 'windows-nsis'

          Remove-Item -Recurse -Force $zipExtract, $tarExtract, $nsisInstall -ErrorAction SilentlyContinue
          Expand-Archive -Path (Join-Path $env:OUTPUT_DIR 'demo-app-windows-x64.zip') -DestinationPath $zipExtract
          Invoke-DemoBinary (Join-Path $zipExtract $env:APP_EXECUTABLE)

          New-Item -ItemType Directory -Path $tarExtract | Out-Null
          tar -xzf (Join-Path $env:OUTPUT_DIR 'demo-app-windows-x64.tar.gz') -C $tarExtract
          Invoke-DemoBinary (Join-Path $tarExtract $env:APP_EXECUTABLE)

          New-Item -ItemType Directory -Path $nsisInstall | Out-Null
          $installer = Join-Path $env:OUTPUT_DIR 'demo-app-windows-x64-setup.exe'
          $arguments = @('/S', "/D=$nsisInstall")
          $process = Start-Process -FilePath $installer -ArgumentList $arguments -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "NSIS installer failed with exit code $($process.ExitCode)"
          }
          Invoke-DemoBinary (Join-Path $nsisInstall $env:APP_EXECUTABLE)

      - name: Upload Windows release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows/*
          fail_on_unmatched_files: true

  build-linux:
    name: Build Linux Packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TARGET_OS: linux
      TARGET_ARCH: x86_64
      RELEASE_DIR: demo_app/release/linux-x86_64
      OUTPUT_DIR: dist/linux
      RPM_TEST_IMAGE: fedora:43
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build and packaging tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake dpkg rpm flatpak flatpak-builder squashfs-tools snapd
          sudo systemctl start snapd.socket
          sudo snap install snapcraft --classic
          sudo snap install core24
          appimagetool="$RUNNER_TEMP/appimagetool"
          curl -L "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -o "$appimagetool"
          chmod +x "$appimagetool"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Install easyinstaller
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pytest

      - name: Set package version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.0.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"

      - name: Run integration tests
        shell: bash
        run: |
          python -m pytest tests_integration -q

      - name: Build demo app release folder
        shell: bash
        run: |
          cmake -S demo_app -B demo_app/build/linux -DCMAKE_BUILD_TYPE=Release
          cmake --build demo_app/build/linux --config Release
          rm -rf "$RELEASE_DIR"
          cmake --install demo_app/build/linux --prefix "$RELEASE_DIR"

      - name: Package Linux artifacts
        shell: bash
        run: |
          mkdir -p "$OUTPUT_DIR"
          base="$OUTPUT_DIR/demo-app-linux-x64"

          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type zip --output "$base"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type tar.gz --output "$base"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type deb --output "$base" --app-name "$APP_NAME" --app-version "$APP_VERSION" --app-exec "$APP_BINARY_NAME"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type rpm --output "$base" --app-name "$APP_NAME" --app-version "$APP_VERSION" --app-exec "$APP_BINARY_NAME"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type appimage --output "$base" --app-name "$APP_NAME" --app-version "$APP_VERSION" --app-exec "$APP_BINARY_NAME"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type flatpak --output "$base" --app-name "$APP_NAME" --app-version "$APP_VERSION" --app-exec "$APP_BINARY_NAME"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type snap --output "$base" --app-name "$APP_NAME" --app-version "$APP_VERSION" --app-exec "$APP_BINARY_NAME"

      - name: Test Linux installers
        shell: bash
        run: |
          set -euo pipefail

          package_root="$(basename "$RELEASE_DIR")"
          zip_extract="$RUNNER_TEMP/linux-zip"
          targz_extract="$RUNNER_TEMP/linux-targz"

          run_demo() {
            local binary_path="$1"
            if [[ ! -x "$binary_path" ]]; then
              echo "Missing executable: $binary_path" >&2
              return 1
            fi
            local output
            output="$($binary_path --headless)"
            if [[ "$output" != *"Hello easyinstaller"* ]]; then
              echo "Unexpected output from $binary_path: $output" >&2
              return 1
            fi
          }

          rm -rf "$zip_extract" "$targz_extract"
          unzip -q "$OUTPUT_DIR/demo-app-linux-x64.zip" -d "$zip_extract"
          run_demo "$zip_extract/$APP_BINARY_NAME"

          mkdir -p "$targz_extract"
          tar -xzf "$OUTPUT_DIR/demo-app-linux-x64.tar.gz" -C "$targz_extract"
          run_demo "$targz_extract/$APP_BINARY_NAME"

          sudo dpkg -i "$OUTPUT_DIR/demo-app-linux-x64.deb"
          run_demo "/usr/bin/$APP_BINARY_NAME"
          sudo dpkg -r "$PACKAGE_NAME"

          rpm -qip "$OUTPUT_DIR/demo-app-linux-x64.rpm"
          rpm -qlp "$OUTPUT_DIR/demo-app-linux-x64.rpm" | grep -F "/opt/$PACKAGE_NAME/$APP_BINARY_NAME"
          docker run --rm \
            -v "$GITHUB_WORKSPACE/$OUTPUT_DIR:/packages:ro" \
            "$RPM_TEST_IMAGE" \
            bash -lc "set -euo pipefail && dnf install -y /packages/demo-app-linux-x64.rpm && output=\$(/opt/$PACKAGE_NAME/$APP_BINARY_NAME --headless) && [[ \$output == *'Hello easyinstaller'* ]] && dnf remove -y $PACKAGE_NAME"

          chmod +x "$OUTPUT_DIR/demo-app-linux-x64.AppImage"
          appimage_output="$("$OUTPUT_DIR/demo-app-linux-x64.AppImage" --appimage-extract-and-run --headless)"
          [[ "$appimage_output" == *"Hello easyinstaller"* ]]

          flatpak install --user -y "$OUTPUT_DIR/demo-app-linux-x64.flatpak"
          flatpak_output="$(flatpak run "$FLATPAK_APP_ID" --headless)"
          [[ "$flatpak_output" == *"Hello easyinstaller"* ]]
          flatpak uninstall --user -y "$FLATPAK_APP_ID"

          sudo snap install --dangerous "$OUTPUT_DIR/demo-app-linux-x64.snap"
          snap_output="$(/snap/bin/$PACKAGE_NAME --headless)"
          [[ "$snap_output" == *"Hello easyinstaller"* ]]
          sudo snap remove "$PACKAGE_NAME"

      - name: Upload Linux release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/linux/*
          fail_on_unmatched_files: true

  build-macos:
    name: Build macOS Packages
    runs-on: macos-latest
    timeout-minutes: 10
    env:
      TARGET_OS: mac
      TARGET_ARCH: arm64
      RELEASE_DIR: demo_app/release/macos-arm64
      OUTPUT_DIR: dist/macos
      APP_EXECUTABLE: demo_easyinstaller
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install easyinstaller
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pytest

      - name: Set package version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.0.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"

      - name: Run integration tests
        shell: bash
        run: |
          python -m pytest tests_integration -q

      - name: Check signing secrets
        id: check-signing
        shell: bash
        run: |
          echo "app_notarization_enabled=${{ secrets.MAC_CERTIFICATE_P12_BASE64 != '' && secrets.MAC_CERTIFICATE_PASSWORD != '' && secrets.MAC_NOTARY_TEAM_NAME != '' && secrets.MAC_NOTARY_APPLE_ID != '' && secrets.MAC_NOTARY_TEAM_ID != '' && secrets.MAC_NOTARY_PASSWORD != '' }}" >> "$GITHUB_OUTPUT"
          echo "pkg_notarization_enabled=${{ secrets.MAC_CERTIFICATE_P12_BASE64 != '' && secrets.MAC_CERTIFICATE_PASSWORD != '' && secrets.MAC_INSTALLER_CERTIFICATE_P12_BASE64 != '' && secrets.MAC_INSTALLER_CERTIFICATE_PASSWORD != '' && secrets.MAC_NOTARY_TEAM_NAME != '' && secrets.MAC_NOTARY_APPLE_ID != '' && secrets.MAC_NOTARY_TEAM_ID != '' && secrets.MAC_NOTARY_PASSWORD != '' }}" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        if: steps.check-signing.outputs.app_notarization_enabled == 'true'
        shell: bash
        env:
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          MAC_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.MAC_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          import_certificate() {
            local cert_base64="$1"
            local cert_password="$2"
            local prefix="$3"
            local secret_name="$4"

            printf '%s' "$cert_base64" | base64 --decode > "$prefix.p12"
            if ! openssl pkcs12 -in "$prefix.p12" -passin pass:"$cert_password" -noout >/dev/null; then
              echo "Decoded $prefix.p12 could not be opened with the provided password for $secret_name."
              echo "Make sure $secret_name was created from the expected .p12 file and the matching Export Password is configured in GitHub Actions secrets."
              exit 1
            fi
            openssl pkcs12 -in "$prefix.p12" -passin pass:"$cert_password" -nodes -out "$prefix.pem"
            openssl pkcs12 -export -in "$prefix.pem" -out "$prefix-compat.p12" \
              -passout pass:"$cert_password" \
              -keypbe PBE-SHA1-3DES \
              -certpbe PBE-SHA1-3DES \
              -macalg sha1
            security import "$prefix-compat.p12" -k build.keychain -P "$cert_password" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productsign -T /usr/bin/productbuild
          }

          security create-keychain -p "$RUNNER_TEMP" build.keychain
          security unlock-keychain -p "$RUNNER_TEMP" build.keychain
          security default-keychain -s build.keychain

          import_certificate "${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}" "$MAC_CERTIFICATE_PASSWORD" app-cert MAC_CERTIFICATE_P12_BASE64
          if [[ "${{ steps.check-signing.outputs.pkg_notarization_enabled }}" == "true" ]]; then
            import_certificate "${{ secrets.MAC_INSTALLER_CERTIFICATE_P12_BASE64 }}" "$MAC_INSTALLER_CERTIFICATE_PASSWORD" installer-cert MAC_INSTALLER_CERTIFICATE_P12_BASE64
          fi

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$RUNNER_TEMP" build.keychain
          security list-keychains -d user -s build.keychain

      - name: Build demo app release folder
        shell: bash
        run: |
          # Apple Silicon binaries require macOS 11.0 or newer even when built on the latest runner.
          cmake -S demo_app -B demo_app/build/macos \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0
          cmake --build demo_app/build/macos --config Release
          rm -rf "$RELEASE_DIR"
          cmake --install demo_app/build/macos --config Release --prefix "$RELEASE_DIR"

      - name: Package macOS artifacts
        shell: bash
        run: |
          mkdir -p "$OUTPUT_DIR"
          archive_base="$OUTPUT_DIR/demo-app-macos-arm64"
          dmg_base="$OUTPUT_DIR/demo-app-macos-arm64-files"
          app_base="$OUTPUT_DIR/demo-app-macos-arm64"
          pkg_base="$OUTPUT_DIR/demo-app-macos-arm64-files"
          app_pkg_base="$OUTPUT_DIR/demo-app-macos-arm64-installer"
          notarize_args=()
          pkg_notarize_args=()

          if [[ "${{ steps.check-signing.outputs.app_notarization_enabled }}" == "true" ]]; then
            notarize_args=(
              --mac-notarize
              --mac-notary-team-name "${{ secrets.MAC_NOTARY_TEAM_NAME }}"
              --mac-notary-apple-id "${{ secrets.MAC_NOTARY_APPLE_ID }}"
              --mac-notary-team-id "${{ secrets.MAC_NOTARY_TEAM_ID }}"
              --mac-notary-password "${{ secrets.MAC_NOTARY_PASSWORD }}"
            )
          fi

          if [[ "${{ steps.check-signing.outputs.pkg_notarization_enabled }}" == "true" ]]; then
            pkg_notarize_args=(
              --mac-notarize
              --mac-notary-team-name "${{ secrets.MAC_NOTARY_TEAM_NAME }}"
              --mac-notary-apple-id "${{ secrets.MAC_NOTARY_APPLE_ID }}"
              --mac-notary-team-id "${{ secrets.MAC_NOTARY_TEAM_ID }}"
              --mac-notary-password "${{ secrets.MAC_NOTARY_PASSWORD }}"
            )
          fi

          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type zip --output "$archive_base" "${notarize_args[@]}"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type tar.gz --output "$archive_base"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type dmg --output "$dmg_base" --app-name "$APP_NAME" "${notarize_args[@]}"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type app-in-dmg --output "$app_base" --app-name "$APP_NAME" --app-version "$APP_VERSION" --app-exec "$APP_EXECUTABLE" "${notarize_args[@]}"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type pkg --output "$pkg_base" --app-name "$APP_NAME" --app-version "$APP_VERSION" --app-exec "$APP_EXECUTABLE" "${pkg_notarize_args[@]}"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type app-in-pkg --output "$app_pkg_base" --app-name "$APP_NAME" --app-version "$APP_VERSION" --app-exec "$APP_EXECUTABLE" "${pkg_notarize_args[@]}"

      - name: Test macOS installers
        shell: bash
        run: |
          set -euo pipefail

          app_signing_enabled="${{ steps.check-signing.outputs.app_notarization_enabled }}"
          pkg_signing_enabled="${{ steps.check-signing.outputs.pkg_notarization_enabled }}"
          package_root="$(basename "$RELEASE_DIR")"
          zip_extract="$RUNNER_TEMP/macos-zip"
          targz_extract="$RUNNER_TEMP/macos-targz"
          dmg_mount="$RUNNER_TEMP/macos-dmg-mount"
          app_dmg_mount="$RUNNER_TEMP/macos-app-dmg-mount"
          dmg_extract="$RUNNER_TEMP/macos-dmg-files"
          app_dmg_extract="$RUNNER_TEMP/macos-app-dmg-files"
          pkg_install_root="$HOME/opt/$PACKAGE_NAME"
          pkg_launcher_path="$HOME/usr/local/bin/$APP_EXECUTABLE"
          app_pkg_install_root="$HOME/Applications/$APP_NAME.app"

          quarantine_value() {
            printf '0083;%x;GitHubActions;%s\n' "$(date +%s)" "$(uuidgen)"
          }

          mark_as_downloaded() {
            local target_path="$1"
            local value
            value="$(quarantine_value)"
            if [[ -d "$target_path" ]]; then
              xattr -w -r com.apple.quarantine "$value" "$target_path"
            else
              xattr -w com.apple.quarantine "$value" "$target_path"
            fi
          }

          assess_gatekeeper_app() {
            local target_path="$1"
            if [[ "$app_signing_enabled" != "true" ]]; then
              return 0
            fi
            spctl --assess --verbose=4 --type execute "$target_path"
          }

          validate_stapled_ticket() {
            local target_path="$1"
            local signing_enabled="$2"
            if [[ "$signing_enabled" != "true" ]]; then
              return 0
            fi
            xcrun stapler validate "$target_path"
          }

          validate_pkg_signature() {
            local package_path="$1"
            if [[ "$pkg_signing_enabled" != "true" ]]; then
              return 0
            fi
            pkgutil --check-signature "$package_path" > /dev/null
            spctl --assess --type install "$package_path"
          }

          assert_file_exists() {
            local target_path="$1"
            if [[ ! -f "$target_path" ]]; then
              echo "Missing file: $target_path" >&2
              return 1
            fi
          }

          assert_dir_exists() {
            local target_path="$1"
            if [[ ! -d "$target_path" ]]; then
              echo "Missing directory: $target_path" >&2
              return 1
            fi
          }

          assert_executable_exists() {
            local target_path="$1"
            if [[ ! -x "$target_path" ]]; then
              echo "Missing executable: $target_path" >&2
              return 1
            fi
          }

          assert_plist_value() {
            local plist_path="$1"
            local key="$2"
            local expected_value="$3"
            local actual_value
            actual_value="$(/usr/libexec/PlistBuddy -c "Print :$key" "$plist_path")"
            if [[ "$actual_value" != "$expected_value" ]]; then
              echo "Unexpected plist value for $key in $plist_path: expected '$expected_value', got '$actual_value'" >&2
              return 1
            fi
          }

          verify_signed_binary() {
            local target_path="$1"
            if [[ "$app_signing_enabled" != "true" ]]; then
              return 0
            fi
            codesign --verify --verbose=4 --strict "$target_path"
          }

          run_demo() {
            local binary_path="$1"
            if [[ ! -x "$binary_path" ]]; then
              echo "Missing executable: $binary_path" >&2
              return 1
            fi
            local output
            output="$($binary_path --headless)"
            if [[ "$output" != *"Hello easyinstaller"* ]]; then
              echo "Unexpected output from $binary_path: $output" >&2
              return 1
            fi
          }

          find_dmg_binary() {
            if [[ -x "$1/$APP_EXECUTABLE" ]]; then
              printf '%s\n' "$1/$APP_EXECUTABLE"
              return 0
            fi
            if [[ -x "$1/$package_root/$APP_EXECUTABLE" ]]; then
              printf '%s\n' "$1/$package_root/$APP_EXECUTABLE"
              return 0
            fi
            return 1
          }

          copy_mount_contents() {
            local mount_path="$1"
            local destination_path="$2"
            local entry
            mkdir -p "$destination_path"
            shopt -s dotglob nullglob
            for entry in "$mount_path"/*; do
              ditto "$entry" "$destination_path/$(basename "$entry")"
            done
            shopt -u dotglob nullglob
          }

          install_user_pkg() {
            local package_path="$1"
            installer -pkg "$package_path" -target CurrentUserHomeDirectory
          }

          rm -rf "$zip_extract" "$targz_extract" "$dmg_mount" "$app_dmg_mount" "$dmg_extract" "$app_dmg_extract" "$pkg_install_root" "$app_pkg_install_root"
          rm -f "$pkg_launcher_path"
          unzip -q "$OUTPUT_DIR/demo-app-macos-arm64.zip" -d "$zip_extract"
          verify_signed_binary "$zip_extract/$APP_EXECUTABLE"
          run_demo "$zip_extract/$APP_EXECUTABLE"

          mkdir -p "$targz_extract"
          tar -xzf "$OUTPUT_DIR/demo-app-macos-arm64.tar.gz" -C "$targz_extract"
          verify_signed_binary "$targz_extract/$APP_EXECUTABLE"
          run_demo "$targz_extract/$APP_EXECUTABLE"

          mkdir -p "$dmg_mount"
          validate_stapled_ticket "$OUTPUT_DIR/demo-app-macos-arm64-files.dmg" "$app_signing_enabled"
          hdiutil attach -nobrowse -readonly -mountpoint "$dmg_mount" "$OUTPUT_DIR/demo-app-macos-arm64-files.dmg"
          copy_mount_contents "$dmg_mount" "$dmg_extract"
          hdiutil detach "$dmg_mount"
          verify_signed_binary "$(find_dmg_binary "$dmg_extract")"
          run_demo "$(find_dmg_binary "$dmg_extract")"

          mkdir -p "$app_dmg_mount"
          validate_stapled_ticket "$OUTPUT_DIR/demo-app-macos-arm64.dmg" "$app_signing_enabled"
          hdiutil attach -nobrowse -readonly -mountpoint "$app_dmg_mount" "$OUTPUT_DIR/demo-app-macos-arm64.dmg"
          mkdir -p "$app_dmg_extract"
          ditto "$app_dmg_mount/$APP_NAME.app" "$app_dmg_extract/$APP_NAME.app"
          hdiutil detach "$app_dmg_mount"
          mark_as_downloaded "$app_dmg_extract/$APP_NAME.app"
          assess_gatekeeper_app "$app_dmg_extract/$APP_NAME.app"
          run_demo "$app_dmg_extract/$APP_NAME.app/Contents/MacOS/$APP_EXECUTABLE"

          validate_pkg_signature "$OUTPUT_DIR/demo-app-macos-arm64-files.pkg"
          validate_stapled_ticket "$OUTPUT_DIR/demo-app-macos-arm64-files.pkg" "$pkg_signing_enabled"
          install_user_pkg "$OUTPUT_DIR/demo-app-macos-arm64-files.pkg"
          assert_dir_exists "$pkg_install_root"
          assert_executable_exists "$pkg_install_root/$APP_EXECUTABLE"
          assert_executable_exists "$pkg_launcher_path"
          run_demo "$pkg_install_root/$APP_EXECUTABLE"
          run_demo "$pkg_launcher_path"

          validate_pkg_signature "$OUTPUT_DIR/demo-app-macos-arm64-installer.pkg"
          validate_stapled_ticket "$OUTPUT_DIR/demo-app-macos-arm64-installer.pkg" "$pkg_signing_enabled"
          install_user_pkg "$OUTPUT_DIR/demo-app-macos-arm64-installer.pkg"
          assert_dir_exists "$app_pkg_install_root"
          assert_executable_exists "$app_pkg_install_root/Contents/MacOS/$APP_EXECUTABLE"
          assert_file_exists "$app_pkg_install_root/Contents/Info.plist"
          assert_plist_value "$app_pkg_install_root/Contents/Info.plist" CFBundleExecutable "$APP_EXECUTABLE"
          assert_executable_exists "$app_pkg_install_root/Contents/Resources/$APP_EXECUTABLE"
          run_demo "$app_pkg_install_root/Contents/MacOS/$APP_EXECUTABLE"

      - name: Upload macOS release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/macos/*
          fail_on_unmatched_files: true
