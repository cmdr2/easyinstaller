name: Release Example Packages

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

env:
  APP_NAME: DemoEasyInstaller
  APP_BINARY_NAME: demo_easyinstaller
  PACKAGE_NAME: demoeasyinstaller
  FLATPAK_APP_ID: com.demoeasyinstaller.app

jobs:
  build-windows:
    name: Build Windows Packages
    runs-on: windows-latest
    env:
      TARGET_OS: windows
      TARGET_ARCH: x86_64
      RELEASE_DIR: example/release/windows-x86_64
      OUTPUT_DIR: dist/windows
      APP_EXECUTABLE: demo_easyinstaller.exe
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install easyinstaller
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pytest

      - name: Install NSIS
        shell: bash
        run: |
          nsis_zip="$RUNNER_TEMP/nsis-3.11.zip"
          curl -L 'https://sourceforge.net/projects/nsis/files/NSIS%203/3.11/nsis-3.11.zip/download' -o "$nsis_zip"
          unzip -q "$nsis_zip" -d "$RUNNER_TEMP"
          echo "$RUNNER_TEMP/nsis-3.11" >> "$GITHUB_PATH"

      - name: Set package version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.0.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"

      - name: Run integration tests
        shell: bash
        run: |
          python -m pytest tests_integration -q

      - name: Build example release folder
        shell: bash
        run: |
          cmake -S example -B example/build/windows -DCMAKE_BUILD_TYPE=Release
          cmake --build example/build/windows --config Release
          rm -rf "$RELEASE_DIR"
          cmake --install example/build/windows --config Release --prefix "$RELEASE_DIR"

      - name: Package Windows artifacts
        shell: bash
        run: |
          mkdir -p "$OUTPUT_DIR"
          archive_base="$OUTPUT_DIR/demo-easyinstaller-windows-x64-setup"

          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type zip --output "$archive_base"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type tar.gz --output "$archive_base"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type nsis --output "$archive_base" --app-name "$APP_NAME" --app-version "$APP_VERSION" --app-exec "$APP_EXECUTABLE"

      - name: Test Windows installers
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $packageRoot = Split-Path -Leaf $env:RELEASE_DIR

          function Invoke-DemoBinary([string]$binaryPath) {
            if (-not (Test-Path $binaryPath)) {
              throw "Missing binary: $binaryPath"
            }

            $output = & $binaryPath --headless
            if ($LASTEXITCODE -ne 0) {
              throw "Binary failed with exit code ${LASTEXITCODE}: $binaryPath"
            }
            if ($output -notmatch 'Hello easyinstaller') {
              throw "Unexpected output from ${binaryPath}: $output"
            }
          }

          $zipExtract = Join-Path $env:RUNNER_TEMP 'windows-zip'
          $tarExtract = Join-Path $env:RUNNER_TEMP 'windows-targz'
          $nsisInstall = Join-Path $env:RUNNER_TEMP 'windows-nsis'

          Remove-Item -Recurse -Force $zipExtract, $tarExtract, $nsisInstall -ErrorAction SilentlyContinue
          Expand-Archive -Path (Join-Path $env:OUTPUT_DIR 'demo-easyinstaller-windows-x64-setup.zip') -DestinationPath $zipExtract
          Invoke-DemoBinary (Join-Path $zipExtract $packageRoot $env:APP_EXECUTABLE)

          New-Item -ItemType Directory -Path $tarExtract | Out-Null
          tar -xzf (Join-Path $env:OUTPUT_DIR 'demo-easyinstaller-windows-x64-setup.tar.gz') -C $tarExtract
          Invoke-DemoBinary (Join-Path $tarExtract $packageRoot $env:APP_EXECUTABLE)

          New-Item -ItemType Directory -Path $nsisInstall | Out-Null
          $installer = Join-Path $env:OUTPUT_DIR 'demo-easyinstaller-windows-x64-setup.exe'
          $arguments = @('/S', "/D=$nsisInstall")
          $process = Start-Process -FilePath $installer -ArgumentList $arguments -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "NSIS installer failed with exit code $($process.ExitCode)"
          }
          Invoke-DemoBinary (Join-Path $nsisInstall $env:APP_EXECUTABLE)

      - name: Upload Windows release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/windows/*
          fail_on_unmatched_files: true

  build-linux:
    name: Build Linux Packages
    runs-on: ubuntu-latest
    env:
      TARGET_OS: linux
      TARGET_ARCH: x86_64
      RELEASE_DIR: example/release/linux-x86_64
      OUTPUT_DIR: dist/linux
      RPM_TEST_IMAGE: fedora:43
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build and packaging tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake dpkg rpm flatpak flatpak-builder squashfs-tools snapd
          sudo systemctl start snapd.socket
          sudo snap install snapcraft --classic
          sudo snap install core24
          appimagetool="$RUNNER_TEMP/appimagetool"
          curl -L "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -o "$appimagetool"
          chmod +x "$appimagetool"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Install easyinstaller
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pytest

      - name: Set package version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.0.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"

      - name: Run integration tests
        shell: bash
        run: |
          python -m pytest tests_integration -q

      - name: Build example release folder
        shell: bash
        run: |
          cmake -S example -B example/build/linux -DCMAKE_BUILD_TYPE=Release
          cmake --build example/build/linux --config Release
          rm -rf "$RELEASE_DIR"
          cmake --install example/build/linux --prefix "$RELEASE_DIR"

      - name: Package Linux artifacts
        shell: bash
        run: |
          mkdir -p "$OUTPUT_DIR"
          base="$OUTPUT_DIR/demo-easyinstaller-linux-x64"

          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type zip --output "$base"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type tar.gz --output "$base"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type deb --output "$base" --app-name "$APP_NAME" --app-version "$APP_VERSION" --app-exec "$APP_BINARY_NAME"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type rpm --output "$base" --app-name "$APP_NAME" --app-version "$APP_VERSION" --app-exec "$APP_BINARY_NAME"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type appimage --output "$base" --app-name "$APP_NAME" --app-version "$APP_VERSION" --app-exec "$APP_BINARY_NAME"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type flatpak --output "$base" --app-name "$APP_NAME" --app-version "$APP_VERSION" --app-exec "$APP_BINARY_NAME"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type snap --output "$base" --app-name "$APP_NAME" --app-version "$APP_VERSION" --app-exec "$APP_BINARY_NAME"

      - name: Test Linux installers
        shell: bash
        run: |
          set -euo pipefail

          package_root="$(basename "$RELEASE_DIR")"
          zip_extract="$RUNNER_TEMP/linux-zip"
          targz_extract="$RUNNER_TEMP/linux-targz"

          run_demo() {
            local binary_path="$1"
            if [[ ! -x "$binary_path" ]]; then
              echo "Missing executable: $binary_path" >&2
              return 1
            fi
            local output
            output="$($binary_path --headless)"
            [[ "$output" == *"Hello easyinstaller"* ]]
          }

          rm -rf "$zip_extract" "$targz_extract"
          unzip -q "$OUTPUT_DIR/demo-easyinstaller-linux-x64.zip" -d "$zip_extract"
          run_demo "$zip_extract/$package_root/$APP_BINARY_NAME"

          mkdir -p "$targz_extract"
          tar -xzf "$OUTPUT_DIR/demo-easyinstaller-linux-x64.tar.gz" -C "$targz_extract"
          run_demo "$targz_extract/$package_root/$APP_BINARY_NAME"

          sudo dpkg -i "$OUTPUT_DIR/demo-easyinstaller-linux-x64.deb"
          run_demo "/usr/bin/$APP_BINARY_NAME"
          sudo dpkg -r "$PACKAGE_NAME"

          rpm -qip "$OUTPUT_DIR/demo-easyinstaller-linux-x64.rpm"
          rpm -qlp "$OUTPUT_DIR/demo-easyinstaller-linux-x64.rpm" | grep -F "/opt/$PACKAGE_NAME/$APP_BINARY_NAME"
          docker run --rm \
            -v "$GITHUB_WORKSPACE/$OUTPUT_DIR:/packages:ro" \
            "$RPM_TEST_IMAGE" \
            bash -lc "set -euo pipefail && dnf install -y /packages/demo-easyinstaller-linux-x64.rpm && output=\$(/opt/$PACKAGE_NAME/$APP_BINARY_NAME --headless) && [[ \$output == *'Hello easyinstaller'* ]] && dnf remove -y $PACKAGE_NAME"

          chmod +x "$OUTPUT_DIR/demo-easyinstaller-linux-x64.AppImage"
          appimage_output="$("$OUTPUT_DIR/demo-easyinstaller-linux-x64.AppImage" --appimage-extract-and-run --headless)"
          [[ "$appimage_output" == *"Hello easyinstaller"* ]]

          flatpak install --user -y "$OUTPUT_DIR/demo-easyinstaller-linux-x64.flatpak"
          flatpak_output="$(flatpak run "$FLATPAK_APP_ID" --headless)"
          [[ "$flatpak_output" == *"Hello easyinstaller"* ]]
          flatpak uninstall --user -y "$FLATPAK_APP_ID"

          sudo snap install --dangerous "$OUTPUT_DIR/demo-easyinstaller-linux-x64.snap"
          snap_output="$(/snap/bin/$PACKAGE_NAME --headless)"
          [[ "$snap_output" == *"Hello easyinstaller"* ]]
          sudo snap remove "$PACKAGE_NAME"

      - name: Upload Linux release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/linux/*
          fail_on_unmatched_files: true

  build-macos:
    name: Build macOS Packages
    runs-on: macos-latest
    env:
      TARGET_OS: mac
      TARGET_ARCH: arm64
      RELEASE_DIR: example/release/macos-arm64
      OUTPUT_DIR: dist/macos
      APP_EXECUTABLE: demo_easyinstaller
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install easyinstaller
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install . pytest

      - name: Set package version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.0.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "APP_VERSION=$version" >> "$GITHUB_ENV"

      - name: Run integration tests
        shell: bash
        run: |
          python -m pytest tests_integration -q

      - name: Check signing secrets
        id: check-signing
        shell: bash
        run: |
          echo "enabled=${{ secrets.MAC_CERTIFICATE_P12_BASE64 != '' && secrets.MAC_CERTIFICATE_PASSWORD != '' && secrets.MAC_NOTARY_TEAM_NAME != '' && secrets.MAC_NOTARY_APPLE_ID != '' && secrets.MAC_NOTARY_TEAM_ID != '' && secrets.MAC_NOTARY_PASSWORD != '' }}" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        if: steps.check-signing.outputs.enabled == 'true'
        shell: bash
        env:
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          printf '%s' "${{ secrets.MAC_CERTIFICATE_P12_BASE64 }}" | base64 --decode > cert.p12
          if ! openssl pkcs12 -in cert.p12 -passin env:MAC_CERTIFICATE_PASSWORD -noout >/dev/null; then
            echo "Decoded cert.p12 could not be opened with MAC_CERTIFICATE_PASSWORD."
            echo "Make sure MAC_CERTIFICATE_P12_BASE64 was created from developer-id.p12 and MAC_CERTIFICATE_PASSWORD matches the Export Password used by openssl pkcs12 -export."
            exit 1
          fi
          openssl pkcs12 -in cert.p12 -passin env:MAC_CERTIFICATE_PASSWORD -nodes -out cert.pem
          openssl pkcs12 -export -in cert.pem -out cert-compat.p12 \
            -passout env:MAC_CERTIFICATE_PASSWORD \
            -keypbe PBE-SHA1-3DES \
            -certpbe PBE-SHA1-3DES \
            -macalg sha1
          security create-keychain -p "$RUNNER_TEMP" build.keychain
          security unlock-keychain -p "$RUNNER_TEMP" build.keychain
          security default-keychain -s build.keychain
          security import cert-compat.p12 -k build.keychain -P "$MAC_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$RUNNER_TEMP" build.keychain
          security list-keychains -d user -s build.keychain

      - name: Build example release folder
        shell: bash
        run: |
          # Apple Silicon binaries require macOS 11.0 or newer even when built on the latest runner.
          cmake -S example -B example/build/macos \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0
          cmake --build example/build/macos --config Release
          rm -rf "$RELEASE_DIR"
          cmake --install example/build/macos --config Release --prefix "$RELEASE_DIR"

      - name: Package macOS artifacts
        shell: bash
        run: |
          mkdir -p "$OUTPUT_DIR"
          archive_base="$OUTPUT_DIR/demo-easyinstaller-macos-arm64"
          dmg_base="$OUTPUT_DIR/demo-easyinstaller-macos-arm64-files"
          app_base="$OUTPUT_DIR/demo-easyinstaller-macos-arm64"
          notarize_args=()

          if [[ "${{ steps.check-signing.outputs.enabled }}" == "true" ]]; then
            notarize_args=(
              --mac-notarize
              --mac-sign-identity "Developer ID Application: ${{ secrets.MAC_NOTARY_TEAM_NAME }} (${{ secrets.MAC_NOTARY_TEAM_ID }})"
              --mac-notary-apple-id "${{ secrets.MAC_NOTARY_APPLE_ID }}"
              --mac-notary-team-id "${{ secrets.MAC_NOTARY_TEAM_ID }}"
              --mac-notary-password "${{ secrets.MAC_NOTARY_PASSWORD }}"
            )
          fi

          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type zip --output "$archive_base" "${notarize_args[@]}"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type tar.gz --output "$archive_base"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type dmg --output "$dmg_base" --app-name "$APP_NAME" "${notarize_args[@]}"
          easyinstaller --source "$RELEASE_DIR" --os "$TARGET_OS" --arch "$TARGET_ARCH" --type app-in-dmg --output "$app_base" --app-name "$APP_NAME" --app-version "$APP_VERSION" --app-exec "$APP_EXECUTABLE" "${notarize_args[@]}"

      - name: Test macOS installers
        shell: bash
        run: |
          set -euo pipefail

          signing_enabled="${{ steps.check-signing.outputs.enabled }}"
          package_root="$(basename "$RELEASE_DIR")"
          zip_extract="$RUNNER_TEMP/macos-zip"
          targz_extract="$RUNNER_TEMP/macos-targz"
          dmg_mount="$RUNNER_TEMP/macos-dmg-mount"
          app_dmg_mount="$RUNNER_TEMP/macos-app-dmg-mount"
          dmg_extract="$RUNNER_TEMP/macos-dmg-files"
          app_dmg_extract="$RUNNER_TEMP/macos-app-dmg-files"

          quarantine_value() {
            printf '0083;%x;GitHubActions;%s\n' "$(date +%s)" "$(uuidgen)"
          }

          mark_as_downloaded() {
            local target_path="$1"
            local value
            value="$(quarantine_value)"
            if [[ -d "$target_path" ]]; then
              xattr -w -r com.apple.quarantine "$value" "$target_path"
            else
              xattr -w com.apple.quarantine "$value" "$target_path"
            fi
          }

          assess_gatekeeper_open() {
            local target_path="$1"
            if [[ "$signing_enabled" != "true" ]]; then
              return 0
            fi
            mark_as_downloaded "$target_path"
            spctl --assess --verbose=4 --type open "$target_path"
          }

          assess_gatekeeper_execute() {
            local container_path="$1"
            local target_path="$2"
            if [[ "$signing_enabled" != "true" ]]; then
              return 0
            fi
            mark_as_downloaded "$container_path"
            spctl --assess --verbose=4 --type execute "$target_path"
          }

          run_demo() {
            local binary_path="$1"
            if [[ ! -x "$binary_path" ]]; then
              echo "Missing executable: $binary_path" >&2
              return 1
            fi
            local output
            output="$($binary_path --headless)"
            [[ "$output" == *"Hello easyinstaller"* ]]
          }

          find_dmg_binary() {
            if [[ -x "$1/$APP_EXECUTABLE" ]]; then
              printf '%s\n' "$1/$APP_EXECUTABLE"
              return 0
            fi
            if [[ -x "$1/$package_root/$APP_EXECUTABLE" ]]; then
              printf '%s\n' "$1/$package_root/$APP_EXECUTABLE"
              return 0
            fi
            return 1
          }

          copy_mount_contents() {
            local mount_path="$1"
            local destination_path="$2"
            local entry
            mkdir -p "$destination_path"
            shopt -s dotglob nullglob
            for entry in "$mount_path"/*; do
              ditto "$entry" "$destination_path/$(basename "$entry")"
            done
            shopt -u dotglob nullglob
          }

          rm -rf "$zip_extract" "$targz_extract" "$dmg_mount" "$app_dmg_mount" "$dmg_extract" "$app_dmg_extract"
          unzip -q "$OUTPUT_DIR/demo-easyinstaller-macos-arm64.zip" -d "$zip_extract"
          assess_gatekeeper_execute "$zip_extract/$package_root" "$zip_extract/$package_root/$APP_EXECUTABLE"
          run_demo "$zip_extract/$package_root/$APP_EXECUTABLE"

          mkdir -p "$targz_extract"
          tar -xzf "$OUTPUT_DIR/demo-easyinstaller-macos-arm64.tar.gz" -C "$targz_extract"
          assess_gatekeeper_execute "$targz_extract/$package_root" "$targz_extract/$package_root/$APP_EXECUTABLE"
          run_demo "$targz_extract/$package_root/$APP_EXECUTABLE"

          mkdir -p "$dmg_mount"
          assess_gatekeeper_open "$OUTPUT_DIR/demo-easyinstaller-macos-arm64-files.dmg"
          hdiutil attach -nobrowse -readonly -mountpoint "$dmg_mount" "$OUTPUT_DIR/demo-easyinstaller-macos-arm64-files.dmg"
          copy_mount_contents "$dmg_mount" "$dmg_extract"
          hdiutil detach "$dmg_mount"
          assess_gatekeeper_execute "$dmg_extract" "$(find_dmg_binary "$dmg_extract")"
          run_demo "$(find_dmg_binary "$dmg_extract")"

          mkdir -p "$app_dmg_mount"
          assess_gatekeeper_open "$OUTPUT_DIR/demo-easyinstaller-macos-arm64.dmg"
          hdiutil attach -nobrowse -readonly -mountpoint "$app_dmg_mount" "$OUTPUT_DIR/demo-easyinstaller-macos-arm64.dmg"
          mkdir -p "$app_dmg_extract"
          ditto "$app_dmg_mount/$APP_NAME.app" "$app_dmg_extract/$APP_NAME.app"
          hdiutil detach "$app_dmg_mount"
          assess_gatekeeper_execute "$app_dmg_extract/$APP_NAME.app" "$app_dmg_extract/$APP_NAME.app"
          run_demo "$app_dmg_extract/$APP_NAME.app/Contents/MacOS/$APP_EXECUTABLE"

      - name: Upload macOS release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/macos/*
          fail_on_unmatched_files: true
